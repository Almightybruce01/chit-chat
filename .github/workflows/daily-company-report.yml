# Phases 1–3: scan, trends, history, optional LLM — updates public /docs dashboard
name: Daily AI Company Report

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report (Phases 1–3)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}/ops"
          python3 -m daily_company \
            --root "${GITHUB_WORKSPACE}" \
            --out "${GITHUB_WORKSPACE}/ops/daily_company/out" \
            --data "${GITHUB_WORKSPACE}/ops/daily_company/data" \
            --dashboard-export "${GITHUB_WORKSPACE}/ops/daily_company/out/history-export.json"

      - name: Publish dashboard to docs/
        run: |
          mkdir -p docs/ai-company
          cp -f ops/daily_company/out/latest-report.json docs/ai-company/
          cp -f ops/daily_company/out/LATEST_REPORT.md docs/ai-company/
          cp -f ops/daily_company/out/history-export.json docs/ai-company/
          cp -f ops/daily_company/dashboard/index.html docs/ai-company/index.html

      - name: Commit (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/daily_company/out ops/daily_company/data docs/ai-company
          git diff --staged --quiet || (git commit -m "chore: daily AI company report [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
