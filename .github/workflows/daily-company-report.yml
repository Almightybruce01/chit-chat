# Phases 1–3: scan, trends, history, optional LLM — uploads reports to Cloudflare KV (private).
# Public repo no longer stores latest-report.json / history-export.json or LATEST_REPORT on Pages.
name: Daily AI Company Report

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report (Phases 1–3)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}/ops"
          python3 -m daily_company \
            --root "${GITHUB_WORKSPACE}" \
            --out "${GITHUB_WORKSPACE}/ops/daily_company/out" \
            --data "${GITHUB_WORKSPACE}/ops/daily_company/data" \
            --dashboard-export "${GITHUB_WORKSPACE}/ops/daily_company/out/history-export.json"

      - name: Set up Node (KV upload)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.DASHBOARD_KV_NAMESPACE_ID != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ops/daily_company/dashboard-worker/package-lock.json

      - name: Upload dashboard JSON to Cloudflare KV
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.DASHBOARD_KV_NAMESPACE_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: ops/daily_company/dashboard-worker
        run: |
          npm ci
          npx wrangler kv key put latest-report \
            --path="${GITHUB_WORKSPACE}/ops/daily_company/out/latest-report.json" \
            --namespace-id="${{ secrets.DASHBOARD_KV_NAMESPACE_ID }}"
          npx wrangler kv key put history-export \
            --path="${GITHUB_WORKSPACE}/ops/daily_company/out/history-export.json" \
            --namespace-id="${{ secrets.DASHBOARD_KV_NAMESPACE_ID }}"

      - name: Sync dashboard HTML to docs (stub / same-origin file only)
        run: |
          mkdir -p docs/ai-company
          cp -f ops/daily_company/dashboard/index.html docs/ai-company/index.html

      - name: Note missing Cloudflare KV secrets
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' || secrets.DASHBOARD_KV_NAMESPACE_ID == '' }}
        run: |
          echo "::warning::KV upload skipped — add CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, DASHBOARD_KV_NAMESPACE_ID (see docs/PRIVATE_DASHBOARD_SETUP.md)"

      - name: Commit (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ai-company/index.html ops/daily_company/data/history.json
          git diff --staged --quiet || (git commit -m "chore: daily AI company report [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
