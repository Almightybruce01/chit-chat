# Deploy the private dashboard Worker. Run manually after KV id + Wrangler secrets are set.
# (Avoids failing on every push while wrangler.toml still has a placeholder namespace id.)
name: Deploy dashboard Worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ops/daily_company/dashboard-worker/package-lock.json

      - name: Prep HTML bundle + deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: ops/daily_company/dashboard-worker
        run: |
          npm ci
          npm run prep
          npx wrangler deploy
