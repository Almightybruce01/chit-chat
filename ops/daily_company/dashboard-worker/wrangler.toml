# Private dashboard — data only in Workers KV. Create namespace:
#   npx wrangler kv namespace create CCS_DASHBOARD_REPORT
# Then set id below (or ./scripts/apply-dashboard-kv-id.sh <uuid> from repo root).

name = "chit-chat-dashboard"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[kv_namespaces]]
binding = "REPORT_KV"
id = "00000000-0000-0000-0000-000000000001"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true
