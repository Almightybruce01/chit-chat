# Paste into .github/workflows/ios-smoke.yml (example — adjust scheme)
name: iOS Smoke Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: xcodebuild -scheme "Chit Chat" -destination "generic/platform=iOS" -quiet build
